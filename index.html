<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>The Ballet Balance</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>The Ballet Balance 🩰</h1>
  <p>Train smart. Dance longer. Stay strong.</p>
</header>

<div class="container">

  <!-- ABOUT -->
  <div class="post">
    <h2>About This Blog</h2>
    <p>This blog shares awareness about overtraining in ballet.</p>
  </div>

  <!-- PODCAST -->
  <div class="post">
    <h2>Podcast</h2>

    <textarea rows="4" class="desc-box">
Write your podcast description here...
    </textarea>

    <button onclick="togglePodcast()">Show Podcast</button>

    <div id="podcast" class="hidden">
      <iframe src="https://drive.google.com/file/d/1hgNmrdAVY1_6Xz_YjhIr1R4niKQE6R73/preview"></iframe>
    </div>
  </div>

  <!-- FLYER -->
  <div class="post">
    <h2>E-Flyer</h2>
    <a href="https://canva.link/mrjake81jrsldtl" target="_blank">
      <button>Open Flyer</button>
    </a>
  </div>

  <!-- QUOTES -->
  <div class="post">
    <h2>Motivation</h2>
    <button onclick="showQuote()">Click for Quote</button>
    <p id="quote" class="hidden"></p>
  </div>

  <!-- MINI GAME -->
  <div class="post">
    <h2>Mini Game 🎮</h2>

    <div id="dancer">🩰😊</div>
    <p>Sophie</p>

    <p id="question">Click start to play!</p>

    <div id="choices"></div>

    <button onclick="startGame()">Start Game</button>

    <p id="result"></p>
  </div>

</div>

<footer>
  <p>Made by Naura 🩰</p>
</footer>

<script src="script.js"></script>
</body>
</html>
